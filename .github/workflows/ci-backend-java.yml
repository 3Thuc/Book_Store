name: CI — Backend Java (Spring Boot)
permissions:
  contents: read
  packages: write
on:
  push:
    branches: [main, develop]
    paths:
      - 'BE/**'
      - '.github/workflows/ci-backend-java.yml'
  pull_request:
    branches: [main]
    paths:
      - 'BE/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BE/BookStorage

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # - name: Run tests
      #   run: mvn test

      # - name: Build JAR
      #   run: mvn package -DskipTests

      - name: Build (skip tests)
        run: mvn clean package -DskipTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: BE/BookStorage/target/surefire-reports/

  docker-build-push:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./BE/BookStorage
          push: true
          tags: ghcr.io/3thuc/book_store/backend-java:latest
      # - name: Trigger Render deploy
      #   if: ${{ secrets.RENDER_API_KEY != '' && secrets.RENDER_SERVICE_ID != '' }}
